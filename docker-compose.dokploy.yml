# Open Wearables — déploiement Dokploy (LeadYou)
# Auto-suffisant : db (PG18) + redis + svix embarqués (déploiement neuf, pas de données
# à migrer ; évite les soucis de privilèges svix sur une base managée).
#
# Adaptations vs docker-compose.prod.yml :
#  - pas de ports hôte (Traefik route via dokploy-network) ; app/frontend exposés
#  - config via .env racine (onglet Environment de l'app Dokploy) au lieu de backend/config/.env
#  - mem_limit sur chaque service ; container_name retirés (Dokploy nomme)
#  - db password paramétré (${DB_PASSWORD})
#
# Domaines (UI Dokploy) : wearables.leadyoupro.com -> frontend:3000 ;
#                         wearables-api.leadyoupro.com -> app:8000

networks:
  default:
  dokploy-network:
    external: true

volumes:
  postgres_data:
  redis_data:

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${DB_NAME:-open-wearables}
      POSTGRES_USER: ${DB_USER:-open-wearables}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-open-wearables} -d ${DB_NAME:-open-wearables}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql
    networks: [default]
    mem_limit: 512m
    restart: unless-stopped

  redis:
    image: redis:8
    volumes:
      - redis_data:/data
    networks: [default]
    mem_limit: 256m
    restart: unless-stopped

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/app.sh
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [default, dokploy-network]
    mem_limit: 768m
    restart: unless-stopped

  celery-worker:
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/worker.sh
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - redis
      - db
      - app
    networks: [default]
    mem_limit: 512m
    restart: unless-stopped

  celery-beat:
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/beat.sh
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - redis
      - db
      - app
    networks: [default]
    mem_limit: 256m
    restart: unless-stopped

  flower:
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/flower.sh
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - redis
      - db
      - app
    networks: [default]
    mem_limit: 256m
    restart: unless-stopped

  svix-server:
    image: svix/svix-server:v1
    entrypoint:
      - sh
      - -c
      - |
        : "$${SVIX_JWT_SECRET:=$$SECRET_KEY}"
        export SVIX_JWT_SECRET
        exec svix-server "$$@"
      - --
    command: ["--run-migrations"]
    env_file:
      - .env
    environment:
      SVIX_DB_DSN: "postgresql://${DB_USER:-open-wearables}:${DB_PASSWORD}@db:5432/svix"
      SVIX_QUEUE_TYPE: "redis"
      SVIX_REDIS_DSN: "redis://redis:6379/1"
      SVIX_CACHE_TYPE: "redis"
    expose:
      - "8071"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    healthcheck:
      test: ["CMD", "svix-server", "healthcheck", "http://localhost:8071"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [default]
    mem_limit: 256m
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL in your environment}
    image: open-wearables-frontend:latest
    pull_policy: never
    expose:
      - "3000"
    depends_on:
      - app
    networks: [default, dokploy-network]
    mem_limit: 128m
    restart: unless-stopped
